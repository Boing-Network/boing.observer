# Lint, unit tests, production build, and Playwright e2e on every PR and push.
# Deploy to Cloudflare runs only after `quality` succeeds on pushes to `main`.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npm run test:e2e
        env:
          CI: true

  deploy:
    name: Deploy to Cloudflare
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy to Cloudflare
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_TESTNET_RPC: ${{ vars.NEXT_PUBLIC_TESTNET_RPC || secrets.NEXT_PUBLIC_TESTNET_RPC }}
          NEXT_PUBLIC_MAINNET_RPC: ${{ vars.NEXT_PUBLIC_MAINNET_RPC || secrets.NEXT_PUBLIC_MAINNET_RPC }}
